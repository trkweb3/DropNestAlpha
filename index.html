<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DropNest Alpha</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0B1020,#111827);
color:white;
}

nav{
display:flex;
align-items:center;
padding:30px 60px;
position:relative;
}

.logo{
position:absolute;
left:60px;
color:#22D3EE;
font-size:20px;
font-weight:bold;
}

.menu{
margin:0 auto;
display:flex;
gap:40px;
}

.menu a{
color:white;
text-decoration:none;
transition:0.3s;
}

.menu a:hover{
color:#22D3EE;
text-shadow:
0 0 10px #22D3EE,
0 0 20px #22D3EE;
}

.hero{
padding:120px 20px;
text-align:center;
}

h1{
font-size:60px;
margin-bottom:20px;
background:linear-gradient(to right,#8B5CF6,#22D3EE);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
font-size:22px;
color:#ccc;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
background:#8B5CF6;
border-radius:12px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
box-shadow:0 0 20px rgba(139,92,246,.7);
}

.ticker{
margin-top:45px;
color:#22D3EE;
font-size:18px;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
padding:60px 20px;
flex-wrap:wrap;
}

.card{
width:280px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 0 30px rgba(139,92,246,.35);
}

.card h2{
color:#22D3EE;
}
</style>
</head>

<body>

<nav>
<div class="logo">DropNest Alpha</div>

<div class="menu">
<a href="#">Home</a>
<a href="#airdrops">Airdrops</a>
<a href="#">Testnets</a>
<a href="#">Claims</a>
<a href="#">Contact</a>
</div>
</nav>

<section class="hero">

<h1>DropNest Alpha</h1>

<p>Your Daily Airdrop Intelligence Hub</p>

<a class="btn" href="#airdrops">
Explore Airdrops
</a>

<div class="ticker">
<marquee width="60%">
Billion Role Claim Live • THEO TGE Watch • Monad New Tasks Added
</marquee>
</div>

</section>

<section id="airdrops" class="cards">

<div class="card">
<h2>THEO</h2>
<p>Status: Active<br>Potential: High</p>
</div>

<div class="card">
<h2>Billion</h2>
<p>Claim Open<br>Reward: Medium</p>
</div>

<div class="card">
<h2>Monad</h2>
<p>Watchlist<br>Potential: High</p>
</div>

</section>

</body>
</html>
